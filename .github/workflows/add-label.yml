name: Add Label Using PAT

on:
  issues:
    types:
      - opened

jobs:
  add-label:
    runs-on: ubuntu-latest

    steps:
      - name: Add triage label
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}

        run: |
          gh issue edit $ISSUE_URL --add-label "triage"